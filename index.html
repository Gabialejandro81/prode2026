function calcPoints(pred, result) {
  if (!pred || !result) return 0;
  const ph=Number(pred.home),pa=Number(pred.away),rh=Number(result.home),ra=Number(result.away);
  if(isNaN(ph)||isNaN(pa)||isNaN(rh)||isNaN(ra)) return 0;
  if(ph===rh&&pa===ra) return 6;
  const po=ph>pa?"H":ph<pa?"A":"D", ro=rh>ra?"H":rh<ra?"A":"D";
  return po===ro?3:0;
}

function getStatus(kickoff) {
  const now=new Date(), ko=new Date(kickoff), diff=(ko-now)/60000;
  if(diff>10) return "upcoming";
  if(diff>-100) return "live";
  return "finished";
}

function fmt(kickoff) {
  const d=new Date(kickoff);
  return d.toLocaleDateString("es-AR",{weekday:"short",day:"2-digit",month:"short"})+" "+

.llbl{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px}
.li{width:100%;padding:11px 13px;background:var(--s2);border:2px solid var(--b);border-radius:8px;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:16px;outline:none;margin-bottom:14px}
.li:focus{border-color:var(--acc)}
.lb2{width:100%;padding:13px;background:var(--acc);color:#000;border:none;border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;cursor:pointer}
.lerr{color:var(--red);font-size:12px;margin-top:7px;text-align:center}
.toast{position:fixed;bottom:86px;left:50%;transform:translateX(-50%);background:var(--grn);color:#000;padding:9px 18px;border-radius:20px;font-weight:700;font-size:12px;z-index:300;animation:tin .3s ease;white-space:nowrap}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.empty{text-align:center;color:var(--mut);padding:36px 20px;font-size:13px}
.loading{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#07090f;color:var(--acc);font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;flex-direction:column;gap:16px}
.spin{width:40px;height:40px;border:3px solid var(--b);border-top-color:var(--acc);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
`;

function App() {
  const [players, setPlayers] = useState(null);
  const [preds,   setPreds]   = useState({});
  const [results, setResults] = useState({});
  const [user,    setUser]    = useState(null);
  const [tab,     setTab]     = useState("matches");
  const [toast,   setToast]   = useState("");
  const [loaded,  setLoaded]  = useState(false);

  useEffect(() => {
    fbGet("players").then(data => {
      if (data) {
        setPlayers(Object.values(data));
      } else {
        const obj = {};
        INITIAL_PLAYERS.forEach(p => { obj[p.id] = p; });
        fbSet("players", obj).then(() => setPlayers(INITIAL_PLAYERS));
      }
      setLoaded(true);
    });
    const offPreds   = fbOn("preds",   v => setPreds(v || {}));
    const offResults = fbOn("results", v => setResults(v || {}));
    const offPlayers = fbOn("players", v => { if(v) setPlayers(Object.values(v)); });
    return () => { offPreds(); offResults(); offPlayers(); };
  }, []);

  function showToast(m) { setToast(m); setTimeout(() => setToast(""), 2500); }

  function login(token) {
    if (!players) return false;
    if (token === ADMIN_TOKEN) { setUser({ id:"admin", name:"Admin" }); return true; }
    const p = players.find(x => x.token === token.trim());
    if (p) { setUser(p); return true; }
    return false;
  }

  function leaderboard() {
    if (!players) return [];
    return players.map(p => ({
      ...p,
      pts: MATCHES.reduce((acc, m) => acc + calcPoints(preds[m.id] && preds[m.id][p.id], results[m.id]), 0)
    })).sort((a,b) => b.pts - a.pts);
  }

  if (!loaded) return (
    <><style>{CSS}</style>
    <div className="loading"><div className="spin"/><span>Cargando…</span></div></>
  );

  if (!user) return <><style>{CSS}</style><Login onLogin={login}/></>;

  const isAdmin = user.id === "admin";

  return (
    <><style>{CSS}</style>
    <div className="app">
      <div className="hdr">
        <div className="hdr-r">
          <div className="logo">PRODE<em>⚽</em>26</div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div className="chip">{isAdmin?"🔧 ADMIN":user.name}</div>
            <button className="logout" onClick={()=>setUser(null)}>salir</button>
          </div>
        </div>
      </div>

      {isAdmin ? (
        <AdminPanel players={players} setPlayers={setPlayers} preds={preds} results={results} showToast={showToast}/>
      ) : (
        <>
          {tab==="matches" && <MatchesTab preds={preds} results={results} user={user} showToast={showToast}/>}
          {tab==="table"   && <TableTab lb={leaderboard()} user={user}/>}
          {tab==="stats"   && <StatsTab preds={preds} results={results} user={user}/>}
          <nav className="bnav">
            {[{id:"matches",i:"⚽",l:"Partidos"},{id:"table",i:"🏆",l:"Tabla"},{id:"stats",i:"📊",l:"Mis stats"}].map(t=>(
              <button key={t.id} className={`bi ${tab===t.id?"on":""}`} onClick={()=>setTab(t.id)}>
                <span className="bi-i">{t.i}</span>{t.l}
              </button>
            ))}
          </nav>
        </>
      )}
      {toast && <div className="toast">{toast}</div>}
    </div></>
  );
}

function Login({onLogin}) {
  const [tok,setTok]=useState(""); const [err,setErr]=useState("");
  function go(){ if(!onLogin(tok.trim())) setErr("Token inválido. Pedíselo al admin."); }
  return(
    <div className="login">
      <div className="ll">PRODE<em style={{color:"#fff",fontStyle:"normal"}}>⚽</em>26</div>
      <div className="ls">Mundial USA · México · Canadá</div>
      <div className="lc2">
        <div className="llbl">Ingresá tu token</div>
        <input className="li" placeholder="ej: leo7x" value={tok}
          onChange={e=>{setTok(e.target.value);setErr("");}}
          onKeyDown={e=>e.key==="Enter"&&go()} autoCapitalize="none" autoCorrect="off"/>
        <button className="lb2" onClick={go}>ENTRAR</button>
        {err&&<div className="lerr">{err}</div>}
      </div>
      <div style={{marginTop:20,fontSize:11,color:"#2a3550",textAlign:"center"}}>Tu token está en el link que te mandó el admin</div>
    </div>
  );
}

function MatchesTab({preds,results,user,showToast}) {
  const [local,setLocal]=useState({});
  const [saved,setSaved]=useState({});
  const [grp,setGrp]=useState("Todos");
  const groups=["Todos",...[...new Set(MATCHES.map(m=>m.group))]];
  const filtered=grp==="Todos"?MATCHES:MATCHES.filter(m=>m.group===grp);

  function save(mid) {
    const myPred = preds[mid] && preds[mid][user.id];
    const h = local[mid+"_h"] !== undefined ? local[mid+"_h"] : (myPred ? myPred.home : "");
    const a = local[mid+"_a"] !== undefined ? local[mid+"_a"] : (myPred ? myPred.away : "");
    if(h===""||a===""){showToast("⚠️ Completá ambos goles");return;}
    fbSet("preds/"+mid+"/"+user.id, {home:Number(h),away:Number(a)});
    setSaved(s=>({...s,[mid]:true})); setTimeout(()=>setSaved(s=>({...s,[mid]:false})),2000);
    showToast("✅ Pronóstico guardado");
  }

  return(
    <div className="sec">
      <div className="stit">Partidos</div>
      <div className="gf">
        {groups.map(g=><button key={g} className={"gfb"+(grp===g?" on":"")} onClick={()=>setGrp(g)}>{g}</button>)}
      </div>
      {filtered.map(m=>{
        const st=getStatus(m.kickoff);
        const myPred=preds[m.id] && preds[m.id][user.id];
        const res=results[m.id];
        const pts=calcPoints(myPred,res);
        const hv=local[m.id+"_h"]!==undefined?local[m.id+"_h"]:(myPred?myPred.home:"");
        const av=local[m.id+"_a"]!==undefined?local[m.id+"_a"]:(myPred?myPred.away:"");
        return(
          <div key={m.id} className="mc">
            <div className="mc-m">
              <span className="mc-g">{m.group}</span>
              <span className="mc-t">{fmt(m.kickoff)}</span>
            </div>
            <div className="mc-te">
              <span className="tn">{m.home}</span>
              <span className="vs">VS</span>
              <span className="tn r">{m.away}</span>
            </div>
            <div className="vn">{m.venue}</div>
            <div>
              {st==="upcoming"&&<span className="bdg bdg-up">Abierto</span>}
              {st==="live"&&<span className="bdg bdg-lv">● En vivo</span>}
              {st==="finished"&&<span className="bdg bdg-fn">Finalizado</span>}
            </div>
            {res&&<div className="res">{res.home} — {res.away}</div>}
            {st==="upcoming"&&(
              <div className="si-r">
                <input className="si" type="number" placeholder="—" value={hv}
                  onChange={e=>setLocal(p=>({...p,[m.id+"_h"]:e.target.value.replace(/\D/,"").slice(0,2)}))}/>
                <span className="si-s">:</span>
                <input className="si" type="number" placeholder="—" value={av}
                  onChange={e=>setLocal(p=>({...p,[m.id+"_a"]:e.target.value.replace(/\D/,"").slice(0,2)}))}/>
                <button className={"sbtn"+(saved[m.id]?" ok":"")} onClick={()=>save(m.id)}>
                  {saved[m.id]?"✓ OK":myPred?"Actualizar":"Guardar"}
                </button>
              </div>
            )}
            {st!=="upcoming"&&!myPred&&<div className="locked">🔒 No ingresaste pronóstico</div>}
            {myPred&&<div className="mypred">
              Tu pronóstico: {myPred.home}-{myPred.away}
              {res&&<span style={{marginLeft:8}}>{pts===6?"🎯 +6":pts===3?"✅ +3":"❌ 0"} pts</span>}
            </div>}
            {res&&myPred&&<div className="ptsc"><span className="ptsv">{pts}</span><span className="ptsl">pts</span></div>}
          </div>
        );
      })}
    </div>
  );
}

function TableTab({lb,user}) {
  return(
    <div className="sec">
      <div className="stit">🏆 Tabla de posiciones</div>
      {lb.map((p,i)=>(
        <div key={p.id} className={"lb-r"+(p.id===user.id?" me":"")}>
          <span className={"lb-p"+(i===0?" g1":i===1?" g2":i===2?" g3":"")}>
            {i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}
          </span>
          <span className="lb-n">
            {p.name}{p.id===user.id&&<span style={{color:"var(--acc)",fontSize:10,marginLeft:6}}>← vos</span>}
          </span>
          <div style={{textAlign:"right"}}>
            <div className="lb-pts">{p.pts}</div>
            <div className="lb-ptsl">pts</div>
          </div>
        </div>
      ))}
    </div>
  );
}

function StatsTab({preds,results,user}) {
  const played=MATCHES.filter(m=>results[m.id]);
  const mine=played.filter(m=>preds[m.id]&&preds[m.id][user.id]);
  const exact=mine.filter(m=>calcPoints(preds[m.id][user.id],results[m.id])===6);
  const part=mine.filter(m=>calcPoints(preds[m.id][user.id],results[m.id])===3);
  const miss=mine.filter(m=>calcPoints(preds[m.id][user.id],results[m.id])===0);
  const total=exact.length*6+part.length*3;
  const pct=mine.length>0?Math.round((exact.length+part.length)/mine.length*100):0;
  return(
    <div className="sec">
      <div className="stit">📊 Mis estadísticas</div>
      <div className="sg">
        {[{l:"Total puntos",v:total,c:"var(--gld)"},{l:"Exactos 🎯",v:exact.length,c:"var(--grn)"},
          {l:"Ganador ✅",v:part.length,c:"var(--acc)"},{l:"Errores ❌",v:miss.length,c:"var(--red)"},
          {l:"Pronosticados",v:mine.length,c:"var(--txt)"},{l:"% Acierto",v:pct+"%",c:"#a78bfa"}].map(s=>(
          <div key={s.l} className="sc"><div className="sv" style={{color:s.c}}>{s.v}</div><div className="sl">{s.l}</div></div>
        ))}
      </div>
      {played.length===0&&<div className="empty">Sin resultados todavía. ¡Volvé cuando arranque el mundial!</div>}
    </div>
  );
}

function AdminPanel({players,setPlayers,preds,results,showToast}) {
  const [at,setAt]=useState("results");
  const [lr,setLr]=useState({});
  const [editing,setEditing]=useState(null);
  const [nv,setNv]=useState("");
  const [grp,setGrp]=useState("Todos");
  const [newName,setNewName]=useState("");
  const [newToken,setNewToken]=useState("");

  const groups=["Todos",...[...new Set(MATCHES.map(m=>m.group))]];
  const fm=grp==="Todos"?MATCHES:MATCHES.filter(m=>m.group===grp);
  const BASE=window.location.href.split("?")[0];

  function saveRes(mid){
    const h=lr[mid+"_h"],a=lr[mid+"_a"];
    if(h===undefined||h===""||a===undefined||a===""){showToast("⚠️ Completá ambos goles");return;}
    fbSet("results/"+mid,{home:Number(h),away:Number(a)});
    showToast("✅ Resultado guardado");
  }

  function saveName(pid){
    if(!nv.trim()) return;
    const updated=players.map(p=>p.id===pid?{...p,name:nv.trim()}:p);
    const obj={}; updated.forEach(p=>{obj[p.id]=p;});
    fbSet("players",obj).then(()=>{setEditing(null);showToast("✅ Nombre actualizado");});
  }

  function addPlayer(){
    if(!newName.trim()||!newToken.trim()){showToast("⚠️ Completá nombre y token");return;}
    if(players.find(p=>p.token===newToken.trim())){showToast("⚠️ Token ya existe, elegí otro");return;}
    const newId="p"+Date.now();
    const newP={id:newId,name:newName.trim(),token:newToken.trim()};
    const updated=[...players,newP];
    const obj={}; updated.forEach(p=>{obj[p.id]=p;});
    fbSet("players",obj).then(()=>{setNewName("");setNewToken("");showToast("✅ Jugador agregado");});
  }

  return(
    <div className="adm">
      <div style={{display:"flex",gap:5,margin:"12px 0",flexWrap:"wrap"}}>
        {[{id:"results",l:"Resultados"},{id:"links",l:"Links"},{id:"all",l:"Pronósticos"},{id:"add",l:"+ Jugador"}].map(t=>(
          <button key={t.id} onClick={()=>setAt(t.id)} style={{flex:1,minWidth:70,padding:"7px 4px",border:"none",borderRadius:8,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:10,fontWeight:700,textTransform:"uppercase",background:at===t.id?"var(--red)":"var(--s2)",color:at===t.id?"#fff":"var(--mut)"}}>
            {t.l}
          </button>
        ))}
      </div>

      {at==="results"&&(<>
        <div className="stit" style={{color:"var(--red)"}}>Cargar resultados</div>
        <div className="gf">{groups.map(g=><button key={g} className={"gfb"+(grp===g?" on":"")} onClick={()=>setGrp(g)}>{g}</button>)}</div>
        {fm.map(m=>{
          const ex=results[m.id];
          const hv=lr[m.id+"_h"]!==undefined?lr[m.id+"_h"]:(ex?ex.home:"");
          const av=lr[m.id+"_a"]!==undefined?lr[m.id+"_a"]:(ex?ex.away:"");
          return(
            <div key={m.id} className="ac">
              <div className="at">{m.home} vs {m.away}</div>
              <div style={{fontSize:10,color:"var(--mut)",marginBottom:8}}>{m.group} · {fmt(m.kickoff)}</div>
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                <span style={{flex:1,fontSize:12,fontWeight:600}}>{m.home}</span>
                <input className="ri" type="number" placeholder="—" value={hv}
                  onChange={e=>setLr(p=>({...p,[m.id+"_h"]:e.target.value.replace(/\D/,"").slice(0,2)}))}/>
                <span style={{fontFamily:"'Bebas Neue',sans-serif",color:"var(--mut)"}}>—</span>
                <input className="ri" type="number" placeholder="—" value={av}
                  onChange={e=>setLr(p=>({...p,[m.id+"_a"]:e.target.value.replace(/\D/,"").slice(0,2)}))}/>
                <span style={{flex:1,fontSize:12,fontWeight:600,textAlign:"right"}}>{m.away}</span>
              </div>
              <button className="cbtn" onClick={()=>saveRes(m.id)}>{ex?"Actualizar":"Guardar resultado"}</button>
            </div>
          );
        })}
      </>)}

      {at==="links"&&(<>
        <div className="stit" style={{color:"var(--red)"}}>Links de jugadores</div>
        <div style={{fontSize:11,color:"var(--mut)",marginBottom:12}}>Mandá el link a cada uno por WhatsApp.</div>
        {players&&players.map(p=>(
          <div key={p.id} className="lc">
            <div className="ne-r">
              {editing===p.id?(
                <><input className="ne-i" value={nv} onChange={e=>setNv(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&saveName(p.id)} autoFocus/>
                <button className="ne-b" onClick={()=>saveName(p.id)}>OK</button>
                <button className="ne-b" style={{background:"var(--s2)",color:"var(--mut)"}} onClick={()=>setEditing(null)}>✕</button></>
              ):(
                <><span style={{fontWeight:600,fontSize:13}}>🙋 {p.name}</span>
                <button className="ne-b" style={{background:"var(--s2)",color:"var(--acc)",fontSize:10,marginLeft:4}}
                  onClick={()=>{setEditing(p.id);setNv(p.name);}}>✏️</button></>
              )}
            </div>
            <div className="lurl">Token: <strong style={{color:"var(--acc)"}}>{p.token}</strong></div>
            <div className="lurl">Link: {BASE}?t={p.token}</div>
            <button className="cpb" onClick={()=>{
              navigator.clipboard.writeText(BASE+"?t="+p.token);
              showToast("📋 Link de "+p.name+" copiado");
            }}>📋 Copiar link</button>
          </div>
        ))}
      </>)}

      {at==="all"&&(<>
        <div className="stit" style={{color:"var(--red)"}}>Todos los pronósticos</div>
        <div className="gf">{groups.map(g=><button key={g} className={"gfb"+(grp===g?" on":"")} onClick={()=>setGrp(g)}>{g}</button>)}</div>
        {fm.map(m=>{
          const st=getStatus(m.kickoff); const res=results[m.id];
          return(
            <div key={m.id} className="ac">
              <div className="at">{m.home} vs {m.away}</div>
              <div style={{fontSize:10,color:"var(--mut)",marginBottom:6}}>{fmt(m.kickoff)}</div>
              {st==="upcoming"?(
                <div style={{fontSize:11,color:"var(--mut)"}}>🔒 Ocultos hasta que empiece</div>
              ):(
                <div className="pg">
                  {players&&players.map(p=>{
                    const pred=preds[m.id]&&preds[m.id][p.id];
                    const pts=calcPoints(pred,res);
                    return(
                      <div key={p.id} className="pgi">
                        <div className="pgn">{p.name}</div>
                        {pred
                          ?<div className={"pgs"+(res?(pts===6?" pgok":pts===3?" pgpa":""):"")}>
                            {pred.home}-{pred.away} {res?(pts===6?"🎯":pts===3?"✅":"❌"):""}
                          </div>
                          :<div style={{fontSize:12,color:"var(--b)"}}>—</div>
                        }
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
      </>)}

      {at==="add"&&(<>
        <div className="stit" style={{color:"var(--red)"}}>Agregar jugador</div>
        <div className="ac">
          <div style={{fontSize:12,color:"var(--mut)",marginBottom:14}}>
            Podés agregar gente en cualquier momento del torneo. El token es su contraseña, elegilo vos.
          </div>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:11,color:"var(--mut)",marginBottom:5,textTransform:"uppercase",letterSpacing:1}}>Nombre</div>
            <input className="ne-i" style={{width:"100%"}} placeholder="ej: Carlos"
              value={newName} onChange={e=>setNewName(e.target.value)}/>
          </div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,color:"var(--mut)",marginBottom:5,textTransform:"uppercase",letterSpacing:1}}>Token (contraseña)</div>
            <input className="ne-i" style={{width:"100%"}} placeholder="ej: carl5z"
              value={newToken} onChange={e=>setNewToken(e.target.value)} autoCapitalize="none"/>
          </div>
          <button className="cbtn" onClick={addPlayer}>Agregar jugador</button>
        </div>
        <div style={{fontSize:11,color:"var(--mut)",padding:"0 4px"}}>
          El link aparece automáticamente en <strong style={{color:"var(--acc)"}}>Links</strong>.
        </div>
      </>)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
