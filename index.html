function pts(pred,res){
  if(!pred||!res) return 0;
  var ph=+pred.home,pa=+pred.away,rh=+res.home,ra=+res.away;
  if(isNaN(ph)||isNaN(pa)||isNaN(rh)||isNaN(ra)) return 0;
  if(ph===rh&&pa===ra) return 6;
  var po=ph>pa?"H":ph<pa?"A":"D",ro=rh>ra?"H":rh<ra?"A":"D";
  return po===ro?3:0;
}

function status(ko){
  var diff=(new Date(ko)-new Date())/60000;
  return diff>10?"upcoming":diff>-100?"live":"finished";
}

function fmt(ko){
  var d=new Date(ko);
  return d.toLocaleDateString("es-AR",{weekday:"short",day:"2-digit",month:"short"})+" "+
         d.toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"});
}
