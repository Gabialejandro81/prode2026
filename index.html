function calcStats(preds,results,uid){
  var played=(window.ALL_MATCHES||MATCHES).filter(function(m){return results[m.id];});
  var mine=played.filter(function(m){return preds[m.id]&&preds[m.id][uid];});
  var exact=mine.filter(function(m){return pts(preds[m.id][uid],results[m.id])===6;}).length;
  var part=mine.filter(function(m){return pts(preds[m.id][uid],results[m.id])===3;}).length;
  var miss=mine.filter(function(m){return pts(preds[m.id][uid],results[m.id])===0;}).length;
  var total=exact*6+part*3;
  var pct=mine.length>0?Math.round((exact+part)/mine.length*100):0;
  return [
    {l:"Total puntos",v:total,c:"var(--gld)"},
    {l:"Exactos 🎯",v:exact,c:"var(--grn)"},
    {l:"Ganador ✅",v:part,c:"var(--acc)"},
    {l:"Errores ❌",v:miss,c:"var(--red)"},
    {l:"Pronosticados",v:mine.length,c:"var(--txt)"},
    {l:"% Acierto",v:pct+"%",c:"#a78bfa"}
  ];
}
